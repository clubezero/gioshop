<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gioShop | Solicitar Saque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0b0e11;
            color: #e9ecef;
            font-family: 'Inter', sans-serif;
        }

        .withdraw-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2rem;
        }

        .balance-badge {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border: 1px solid rgba(13, 110, 253, 0.2);
        }

        .form-control {
            background-color: #0d1117 !important;
            border: 1px solid #30363d !important;
            color: #fff !important;
            border-radius: 12px;
        }

        .btn-withdraw {
            background: linear-gradient(45deg, #0d6efd, #0dcaf0);
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="withdraw-card p-4 p-md-5 shadow-lg">
                    <div class="text-center mb-4">
                        <i class="bi bi-wallet2 text-primary display-4"></i>
                        <h3 class="fw-bold mt-2">Retirar <span class="text-primary">Lucros</span></h3>
                        <div class="badge balance-badge rounded-pill px-3 py-2 mt-2">
                            Saldo Disponível: {{ "{:,.2f}".format(current_user.saldo_actual) }} Kz
                        </div>
                    </div>

                    <form action="" method="POST">
                        <div class="mb-3">
                            <label class="form-label small text-muted">Quanto deseja sacar?</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-white">Kz</span>
                                <input type="number" name="amount" class="form-control" step="0.01" min="500" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted">Seu IBAN para transferência</label>
                            <input type="text" name="iban" class="form-control" placeholder="AO06..." required>
                            <div class="form-text text-muted" style="font-size: 0.7rem;">Verifique os dados com atenção.
                                Erros de IBAN não podem ser revertidos.</div>
                        </div>

                        <button type="submit" class="btn btn-withdraw btn-lg w-100 rounded-pill py-3 text-white">
                            SOLICITAR LEVANTAMENTO
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <a href="{{url_for('extrato')}}" class="text-muted small text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Voltar ao extrato
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
